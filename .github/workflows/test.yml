name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        run: sudo apt-get install -y emacs-nox

      - name: Run ERT tests
        run: emacs --batch -l test/taskjuggler-mode-test.el -f ert-run-tests-batch-and-exit
